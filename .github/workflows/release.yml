name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: linux
            goarch: arm
            goarm: 7
            suffix: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          BINARY_NAME="dae-panel"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="dae-panel.exe"
          fi
          go build -ldflags="-s -w" -o "dist/${BINARY_NAME}" .

      - name: Package
        run: |
          cd dist
          ARCH="${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" = "arm" ]; then
            ARCH="armv7a"
          fi
          ARCHIVE_NAME="dae-panel-${{ matrix.goos }}-${ARCH}"
          tar -czf "../${ARCHIVE_NAME}.tar.gz" dae-panel
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dae-panel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-armv{0}', matrix.goarm) || '' }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          ls -la release/

      - name: Generate Checksums
        run: |
          cd release
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: dae-panel ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums-sha256.txt
