name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Backend
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -o dae-panel .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dae-panel-linux-amd64
          path: dae-panel
